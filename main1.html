<article>

  <div class="video-container" data-video="h84qtM0frb8">
    <div class="video-placeholder">
      <button class="play-btn" aria-label="Play video">▶</button>
    </div>
  </div>

</article>

<style>
.video-container {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
}

.video-placeholder {
  position: absolute;
  inset: 0;
  background: url("https://img.youtube.com/vi/h84qtM0frb8/maxresdefault.jpg") center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.play-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  font-size: 24px;
  background: rgba(0,0,0,0.7);
  color: white;
}
</style>

<script>
document.querySelectorAll(".video-container").forEach(container => {
  const videoId = container.dataset.video;

  container.addEventListener("click", () => {
    container.innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&rel=0&modestbranding=1"
        frameborder="0"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>
    `;
  });
});
</script>
