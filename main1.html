<article>

  <div class="video-container" data-video="DILHgrqbzw0">
    <div class="video-placeholder" role="button" aria-label="Play video">
      <button class="play-btn">▶</button>
    </div>
  </div>

</article>

<style>
.video-container {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
}

 
.video-placeholder {
  position: absolute;
  inset: 0;
  background: url("https://img.youtube.com/vi/DILHgrqbzw0/maxresdefault.jpg") center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.play-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  font-size: 24px;
  background: rgba(0,0,0,0.7);
  color: #fff;
}
</style>

<script>
document.querySelectorAll(".video-container").forEach(container => {
  const videoId = container.dataset.video;

  container.addEventListener("click", () => {
    const iframe = document.createElement("iframe");

    iframe.src =
      "https://www.youtube.com/embed/" +
      videoId +
      "?autoplay=1&mute=0&rel=0&modestbranding=1";

    iframe.setAttribute("frameborder", "0");
    iframe.setAttribute("allow", "autoplay; encrypted-media; picture-in-picture");
    iframe.setAttribute("allowfullscreen", "");

    container.innerHTML = "";
    container.appendChild(iframe);
  });
});
</script>
