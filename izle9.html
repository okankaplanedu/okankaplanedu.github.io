<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Counter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #00FFCC;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #counter {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
    </style>
</head>
<body>

    <div id="counter">...</div>

    <script>
        // 🚀 Senin gerçek Google Sheets ID'ni tam yerine yerleştirdik usta!
        const spreadsheetId = "1YTNeqqpJ9PFUjwT_DFJ7vkX3KEFbsLWgc109cTEWfaM";
        
        // Bu sorgu doğrudan A sütunundaki verileri (satırları) saf okuma modunda çeker.
        const jsonURL = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&tq=select+A`;

        // Hafızadaki son sayı (Sayfa yenilendiğinde burası baştan güncellenecek)
        let lastCount = localStorage.getItem('last_visitor_count') ? parseInt(localStorage.getItem('last_visitor_count')) : null;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playVisitorSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(1500, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch (e) {
                console.error(e);
            }
        }

        function triggerClickEffect() {
            playVisitorSound();
            const el = document.getElementById("counter");
            el.style.transform = "scale(1.25)";
            setTimeout(() => {
                el.style.transform = "scale(1)";
            }, 120);
        }

        // 📡 GÜVENLİ VE SAF OKUMA MEKANİZMASI (.exec YOK!)
        function getData() {
            fetch(jsonURL)
                .then(res => res.text())
                .then(text => {
                    // Google'ın gviz formatındaki ham veriyi temiz JSON'a çevirme
                    const temp = text.substring(text.indexOf('\n') + 1);
                    const jsonString = temp.substring(temp.indexOf('{'), temp.lastIndexOf('}') + 1);
                    const obj = JSON.parse(jsonString);
                    
                    if (obj && obj.table && obj.table.rows) {
                        // A sütunundaki toplam satır sayısını (üretim miktarını) net olarak sayıyoruz
                        const currentCount = obj.table.rows.length; 
                        const el = document.getElementById("counter");

                        // Ekranı her zaman en son güncel sayıyla eşitle
                        el.innerText = currentCount;

                        // REFRESH / İLK AÇILIŞ KONTROLÜ:
                        // Eğer hafıza boşsa, gelen güncel sayıyı hafızaya kilitle ve ses çıkarmadan başla
                        if (lastCount === null) {
                            lastCount = currentCount;
                            localStorage.setItem("last_visitor_count", currentCount);
                            return;
                        }

                        // 🔔 Sadece sayfa açıkken yeni bir satır eklenirse (currentCount > lastCount) ses ver
                        if (currentCount > lastCount) {
                            triggerClickEffect();
                        }

                        // Hafızayı en son sayıya eşitle ve devam et
                        lastCount = currentCount;
                        localStorage.setItem("last_visitor_count", currentCount);
                    }
                })
                .catch(err => console.error("Salt okuma hatası:", err));
        }

        // Tıklayınca sadece ses motorunu uyandırır ve veriyi yeniler (Asla satır eklemez)
        document.getElementById("counter").addEventListener("click", () => {
            initAudio();
            getData();
        });

        // REFRESH YAPILDIĞINDA TETİKLENEN ALAN
        window.addEventListener("DOMContentLoaded", () => {
            const el = document.getElementById("counter");
            
            // Eğer tarayıcıda eski sayı kayıtlıysa, Google'dan cevap gelene kadar ekranda o dursun
            if (lastCount !== null) {
                el.innerText = lastCount;
            }
            
            getData(); // Gidip A sütununu sayar ve storage'a en son sayıyı eşitler
            setInterval(getData, 10000); // 10 saniyede bir salt okunur döngüye devam eder
        });
    </script>

</body>
</html>
