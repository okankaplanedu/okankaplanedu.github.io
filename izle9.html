<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Counter</title>

<style>
body {
    margin: 0;
    background-color: #0b0f19;
    color: #00FFCC;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
    overflow: hidden;
}

#counter {
    font-size: 120px;
    font-weight: bold;
    text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
    transition: transform 0.15s ease;
}
</style>
</head>

<body>

<div id="counter">0</div>

<script>
const spreadsheetId = "AKfycbycFwlIDvjqFE5_31IGzLb8X-wLSg4Fi8UEFNrSuvYtep5y8h210ts7C8XQuoAzB5qOzg";
const jsonURL = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json`;

let lastCount = localStorage.getItem("last_visitor_count")
    ? parseInt(localStorage.getItem("last_visitor_count"))
    : null;

let audioCtx = null;

// 🔊 SES
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playSound() {
    initAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(1500, audioCtx.currentTime);

    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

// ✨ ANİMASYON
function clickEffect() {
    playSound();

    const el = document.getElementById("counter");
    el.style.transform = "scale(1.25)";

    setTimeout(() => {
        el.style.transform = "scale(1)";
    }, 120);
}

// 📦 GVIZ PARSER
function parseGVIZ(text) {
    const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    return JSON.parse(jsonString);
}

// 📡 SADECE OKU
function getData() {
    fetch(jsonURL)
        .then(res => res.text())
        .then(text => {
            const obj = parseGVIZ(text);

            if (!obj?.table?.rows) return;

            // 🔥 A SÜTUNUNDAKİ DOLU SATIRLARI SAY
            const currentCount = obj.table.rows.filter(row =>
                row.c && row.c[0] && row.c[0].v !== null && row.c[0].v !== ""
            ).length;

            const el = document.getElementById("counter");
            el.innerText = currentCount;

            // 🧠 ilk yükleme
            if (lastCount === null) {
                lastCount = currentCount;
                localStorage.setItem("last_visitor_count", currentCount);
                return;
            }

            // 🔥 SADECE ARTIŞTA TETİKLE
            if (currentCount > lastCount) {
                clickEffect();
            }

            lastCount = currentCount;
            localStorage.setItem("last_visitor_count", currentCount);
        })
        .catch(console.error);
}

// 🚀 START
window.addEventListener("DOMContentLoaded", () => {
    const el = document.getElementById("counter");

    if (lastCount !== null) {
        el.innerText = lastCount;
    }

    getData();
    setInterval(getData, 10000);
});
</script>

</body>
</html>
