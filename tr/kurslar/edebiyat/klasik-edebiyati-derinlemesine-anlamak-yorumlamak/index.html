<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Klasik Edebiyatı Derinlemesine Anlamak ve Yorumlamak | Okan Kaplan Edu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://okankaplanedu.github.io/assets/css/ind.css" rel="stylesheet">

<style>
.grid-item { width: 100%; margin-bottom: 16px; }
.is-hidden { display: none !important; }
</style>

</head>

<body>

<main class="container-fluid px-4">

<div class="grid" id="masonry-container">
    <div class="grid-sizer"></div>
</div>

</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<script>

const CONFIG = {
    owner: "okankaplanedu",
    repo: "okankaplanedu.github.io",
    branch: "main",
    baseFolder: "tr/kurslar/edebiyat/klasik-edebiyati-derinlemesine-anlamak-yorumlamak/",
    cacheKey: "course_cache_v1",
    cacheTime: 3600000,
    concurrency: 6
};

let masonry;
let temp = [];

/* ---------------- MASONRY ---------------- */

function initMasonry() {
    masonry = $('#masonry-container').masonry({
        itemSelector: '.grid-item',
        columnWidth: '.grid-sizer',
        percentPosition: true
    });
}

/* ---------------- CACHE ---------------- */

const Cache = {
    get() {
        const d = localStorage.getItem(CONFIG.cacheKey);
        if (!d) return null;

        const p = JSON.parse(d);
        if (Date.now() - p.t > CONFIG.cacheTime) return null;

        return p.data;
    },

    set(data) {
        localStorage.setItem(CONFIG.cacheKey, JSON.stringify({
            t: Date.now(),
            data
        }));
    }
};

/* ---------------- CARD ---------------- */

function renderCard(a) {

    const text = `${a.title} ${a.description} ${a.keywords}`
        .toLowerCase()
        .replace(/\s+/g, ' ');

    const html = `
    <div class="grid-item" data-search="${text}">
        <div class="card p-3">
            <h5>${a.title}</h5>
            <p>${a.description}</p>
            <small>${a.keywords}</small>
            <a href="${a.url}" target="_top">Open</a>
        </div>
    </div>`;

    const $el = $(html);

    $('#masonry-container').append($el);

    if (masonry) {
        masonry.appended($el);
        $('#masonry-container').imagesLoaded(() => masonry.layout());
    }
}

/* ---------------- SEARCH ---------------- */

function search(val) {

    val = (val || '').toLowerCase().trim();

    $('.grid-item').each(function () {

        const t = $(this).data('search') || '';
        const show = val === '' || t.includes(val);

        $(this).toggle(show);
    });

    if (masonry) setTimeout(() => masonry.layout(), 50);
}

$(document).on('input', '#search', function () {
    search($(this).val());
});

/* ---------------- SCAN ---------------- */

async function scan() {

    const res = await fetch(
        `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/git/trees/${CONFIG.branch}?recursive=1`
    );

    const data = await res.json();

    const files = data.tree.filter(f =>
        f.path.startsWith(CONFIG.baseFolder) &&
        f.path.endsWith("index.html")
    );

    for (const f of files) {

        const r = await fetch(
            `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${f.path}`
        );

        const html = await r.text();
        const doc = new DOMParser().parseFromString(html, "text/html");

        const item = {
            title: doc.title || "No title",
            description: doc.querySelector('meta[name="description"]')?.content || "",
            keywords: doc.querySelector('meta[name="keywords"]')?.content || "",
            url: `https://${CONFIG.owner}.github.io/${f.path.replace('index.html','')}`
        };

        temp.push(item);
        renderCard(item);
    }
}

/* ---------------- START ---------------- */

async function start() {

    initMasonry();

    const cache = Cache.get();

    if (cache) {

        cache.forEach(renderCard);

        $('#masonry-container').imagesLoaded(() => {
            masonry.layout();
        });

    } else {

        await scan();
        Cache.set(temp);
    }
}

$(start);

</script>

</body>
</html>
