<body>

<script>

fetch(

</script>

<main class="container-fluid px-4 py-4">

<div id="main1"></div>

<h1 class="visually-hidden">
Content Feed
</h1>

<div
    class="text-center mb-4"
    id="status-container"
    style="display:none"
>

    <div id="status">

        <div
            class="spinner-border spinner-border-sm text-primary"
            role="status"
            id="status-spinner"
        ></div>

        <span id="status-message">

            Preparing system...

        </span>

    </div>

</div>

<div
    class="grid"
    id="masonry-container"
>

    <div
        class="grid-sizer"
        aria-hidden="true"
    ></div>

</div>

<div id="main2"></div>
<div id="main3"></div>

</main>

<div id="footer-placeholder"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<script>

const CONFIG = {

    owner: "okankaplanedu",

    repo: "okankaplanedu.github.io",

    branch: "main",

    baseFolder:
    "tr/kurslar/edebiyat/klasik-edebiyati-derinlemesine-anlamak-yorumlamak/",

    cacheKey:
    "ok_edebiyat1_cache_v2",

    cacheTime:
    3600000,

    fetchDelay:
    120
};

let masonryGrid;

let tempArchive = [];

function initMasonry(){

    masonryGrid = $('#masonry-container').masonry({

        itemSelector: '.grid-item',

        columnWidth: '.grid-sizer',

        percentPosition: true,

        transitionDuration: '0.3s'
    });
}

const Cache = {

    get: () => {

        const data = localStorage.getItem(
            CONFIG.cacheKey
        );

        if(!data) return null;

        const parsed = JSON.parse(data);

        if(
            Date.now() - parsed.timestamp >
            CONFIG.cacheTime
        ){
            return null;
        }

        return parsed.articles;
    },

    set: (articles) => {

        localStorage.setItem(

            CONFIG.cacheKey,

            JSON.stringify({

                timestamp: Date.now(),

                articles: articles
            })
        );
    }
};

function renderCard(article){

    const plainText = `
        ${article.title}
        ${article.description}
        ${article.keywords}
    `.toLowerCase();

    const imageHTML = article.image
    ? `
        <img
            src="${article.image}"
            class="img-fluid w-100"
            alt="${article.title}"
            loading="lazy"
        >
    `
    : "";

    const cardHTML = `

    <div
        class="grid-item"
        data-search="${plainText}"
    >

        <div class="card-custom">

            ${imageHTML}

            <div class="card-body-custom">

                <h2 class="card-title-custom">

                    ${article.title}

                </h2>

                <p class="card-desc-custom">

                    ${article.description}

                </p>

                <div class="card-keywords-custom">

                    ${article.keywords}

                </div>

                <a
                    href="${article.url}"
                    class="btn-open"
                    target="_top"
                    rel="noopener noreferrer"
                >

                    Open Course →

                </a>

            </div>

        </div>

    </div>
    `;

    const $item = $(cardHTML);

    $('#masonry-container').append($item);

    $item.imagesLoaded(() => {

        masonryGrid
        .masonry('appended', $item)
        .masonry('layout');
    });
}

function applySearch(val){

    val = (val || '')
    .toLowerCase()
    .trim();

    $('.grid-item').each(function(){

        const text =
        $(this).data('search') || '';

        $(this).toggleClass(

            'is-hidden',

            val !== '' &&
            !text.includes(val)
        );
    });

    if(masonryGrid){

        masonryGrid.masonry('layout');
    }
}

$(document).on(

    'input keyup',

    '#search-input',

    function(){

        applySearch($(this).val());
    }
);

const headerObserver =
new MutationObserver(function(){

    const $input =
    $('#search-input');

    if($input.length){

        applySearch($input.val());
    }
});

headerObserver.observe(

    document.getElementById(
        'header-container'
    ),

    {
        childList:true,
        subtree:true
    }
);

function updateUIStatus(msg){

    const txt =
    document.getElementById(
        "status-message"
    );

    if(txt){

        txt.innerText = msg;
    }
}

function finalizeUI(isCache=false){

    const spinner =
    document.getElementById(
        "status-spinner"
    );

    if(spinner){

        spinner.style.display = "none";
    }

    document.getElementById(
        "status"
    ).innerHTML = `

        <span style="color:#10b981">
            ●
        </span>

        <span
            style="
                font-size:13px;
                font-weight:600;
            "
        >

            ${
                isCache
                ? 'Fast Cache Load'
                : 'Courses Updated'
            }

        </span>
    `;

    setTimeout(() => {

        $('#status-container').fadeOut();

    }, 2500);
}

async function scanAndCache(path){

    try{

        const res = await fetch(

            `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`

        );

        if(!res.ok){

            console.error(
                "GitHub API Error:",
                res.status
            );

            return;
        }

        const items =
        await res.json();

        for(const item of items){

            if(item.type === "dir"){

                await scanAndCache(
                    item.path
                );
            }

            else if(

                item.type === "file" &&

                item.name
                .toLowerCase() ===
                "index.html"

            ){

                updateUIStatus(

                    `Scanning: ${
                        item.path
                        .split('/')
                        .slice(-2,-1)
                    }`
                );

                const contentRes =
                await fetch(

                    `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${item.path}`

                );

                if(contentRes.ok){

                    const html =
                    await contentRes.text();

                    const doc =
                    new DOMParser()
                    .parseFromString(
                        html,
                        "text/html"
                    );

                    const title =
                    doc.querySelector("title")
                    ?.innerText
                    ?.trim()
                    || "Untitled";

                    const description =
                    doc.querySelector(
                        'meta[name="description"]'
                    )
                    ?.getAttribute("content")
                    ?.trim()
                    || "";

                    const keywords =
                    doc.querySelector(
                        'meta[name="keywords"]'
                    )
                    ?.getAttribute("content")
                    ?.trim()
                    || "";

                    const image =
                    doc.querySelector(
                        'meta[property="og:image"]'
                    )
                    ?.getAttribute("content")
                    ?.trim()
                    || "";

                    const data = {

                        url:
                        `https://okankaplanedu.github.io/${
                            item.path.replace(
                                'index.html',
                                ''
                            )
                        }`,

                        title,
                        description,
                        keywords,
                        image
                    };

                    tempArchive.push(data);

                    renderCard(data);
                }

                await new Promise(

                    r => setTimeout(
                        r,
                        CONFIG.fetchDelay
                    )
                );
            }
        }

    }catch(e){

        console.error(
            "Scan Error:",
            e
        );
    }
}

async function startApp(){

    $('#status-container').show();

    initMasonry();

    const cachedArticles =
    Cache.get();

    if(cachedArticles){

        cachedArticles.forEach(
            art => renderCard(art)
        );

        finalizeUI(true);

        return;
    }

    await scanAndCache(
        CONFIG.baseFolder
    );

    if(tempArchive.length > 0){

        Cache.set(tempArchive);
    }

    finalizeUI(false);
}

$(document).ready(startApp);

'https://raw.githubusercontent.com/bandanee/root/main/import/footer.html'

</script>
