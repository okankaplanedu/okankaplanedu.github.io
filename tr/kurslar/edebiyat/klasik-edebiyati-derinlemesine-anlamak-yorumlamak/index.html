<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klasik Edebiyat Masonry Final</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body { background:#f5f5f5; }

.grid { width:100%; }
.grid-sizer { width:33.333%; }

.grid-item {
  width:33.333%;
  padding:10px;
  box-sizing:border-box;
}

.card-custom {
  background:#fff;
  border-radius:12px;
  padding:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.is-hidden {
  display:none !important;
}
</style>
</head>

<body>

<div class="container py-4">

  <input id="search-input" class="form-control mb-3" placeholder="Ara...">

  <div id="masonry-container" class="grid">
    <div class="grid-sizer"></div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<script>

/* ================= CONFIG ================= */
const CONFIG = {
  owner: "okankaplanedu",
  repo: "okankaplanedu.github.io",
  branch: "main",
  baseFolder: "tr/kurslar/edebiyat/klasik-edebiyati-derinlemesine-anlamak-yorumlamak/",
  cacheKey: "final_masonry_cache",
  cacheTime: 3600000
};

let masonry;
let temp = [];

/* ================= MASONRY ================= */
function initMasonry() {
  masonry = $('#masonry-container').masonry({
    itemSelector: '.grid-item',
    columnWidth: '.grid-sizer',
    percentPosition: true,
    transitionDuration: '0.3s'
  });
}

/* ================= CACHE ================= */
const Cache = {
  get() {
    try {
      const d = localStorage.getItem(CONFIG.cacheKey);
      if (!d) return null;
      const p = JSON.parse(d);
      if (Date.now() - p.t > CONFIG.cacheTime) return null;
      return p.data;
    } catch { return null; }
  },

  set(data) {
    localStorage.setItem(CONFIG.cacheKey, JSON.stringify({
      t: Date.now(),
      data
    }));
  }
};

/* ================= RENDER (SAFE) ================= */
function renderAll(list) {

  $('#masonry-container').empty();
  initMasonry();

  const $items = $();

  list.forEach(a => {

    const html = `
      <div class="grid-item" data-search="${(a.title + a.description).toLowerCase()}">
        <div class="card-custom">
          <h5>${a.title}</h5>
          <p>${a.description}</p>
          <a href="${a.url}" target="_blank">Open</a>
        </div>
      </div>
    `;

    $items.add($(html));
  });

  $('#masonry-container').append($items);

  // 🔥 TEK SEFER LAYOUT (EN STABİL YÖNTEM)
  $('#masonry-container').imagesLoaded(function () {
    masonry.layout();
  });
}

/* ================= SEARCH ================= */
function search(val) {
  val = val.toLowerCase();

  $('.grid-item').each(function () {
    const t = $(this).data('search');
    $(this).toggle(!val || t.includes(val));
  });

  setTimeout(() => masonry.layout(), 100);
}

$(document).on('input', '#search-input', function () {
  search(this.value);
});

/* ================= FETCH ================= */
async function scan() {

  const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/git/trees/${CONFIG.branch}?recursive=1`;

  const res = await fetch(url);
  const data = await res.json();

  const files = data.tree.filter(f =>
    f.type === "blob" &&
    f.path.startsWith(CONFIG.baseFolder) &&
    f.path.endsWith("index.html")
  );

  const result = [];

  for (let f of files) {

    const r = await fetch(
      `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${f.path}`
    );

    if (!r.ok) continue;

    const html = await r.text();
    const doc = new DOMParser().parseFromString(html, "text/html");

    result.push({
      title: doc.querySelector("title")?.innerText || "No title",
      description: doc.querySelector('meta[name="description"]')?.content || "",
      url: "https://" + CONFIG.repo + "/" + f.path.replace("index.html", "")
    });
  }

  return result;
}

/* ================= START ================= */
async function start() {

  initMasonry();

  const cached = Cache.get();

  if (cached && cached.length) {
    renderAll(cached);
  } else {

    const data = await scan();

    Cache.set(data);

    renderAll(data);
  }
}

$(document).ready(start);

</script>

</body>
</html>
