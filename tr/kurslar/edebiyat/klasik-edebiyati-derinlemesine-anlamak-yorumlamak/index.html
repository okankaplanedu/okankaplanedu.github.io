<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script>

const CONFIG = {
    owner:      "okankaplanedu",
    repo:       "okankaplanedu.github.io",
    branch:     "main",
    baseFolder: "tr/kurslar/edebiyat/klasik-edebiyati-derinlemesine-anlamak-yorumlamak/",
    cacheKey:   "ok_klasik-edebiyat_cache_v3",
    cacheTime:  3600000,
    fetchDelay: 80,
    concurrency: 6
};

let masonryGrid;
let tempArchive = [];

/* ── MASONRY ─────────────────────────────────────────────────────── */

// itemSelector'da :not(.is-hidden) YOK — Masonry item listesi
// runtime'da değişmez, görünürlüğü CSS/jQuery.toggle ile yönetiyoruz.
function initMasonry() {
    masonryGrid = $('#masonry-container').masonry({
        itemSelector:      '.grid-item',
        columnWidth:       '.grid-sizer',
        percentPosition:   true,
        transitionDuration: '0.3s'
    });
}

/* ── CACHE ───────────────────────────────────────────────────────── */

const Cache = {
    get() {
        const data = localStorage.getItem(CONFIG.cacheKey);
        if (!data) return null;
        const parsed = JSON.parse(data);
        if (Date.now() - parsed.timestamp > CONFIG.cacheTime) return null;
        return parsed.articles;
    },
    set(articles) {
        localStorage.setItem(
            CONFIG.cacheKey,
            JSON.stringify({ timestamp: Date.now(), articles })
        );
    }
};

/* ── CARD ────────────────────────────────────────────────────────── */

function renderCard(article) {

    const plainText = `
        ${article.title}
        ${article.description}
        ${article.keywords}
    `.toLowerCase().replace(/\s+/g, ' ');

    const cardHTML = `
    <div class="grid-item" data-search="${plainText}">
        <div class="card-custom">
            <div class="card-body-custom">
                <h2>${article.title}</h2>
                <p>${article.description}</p>
                <div>${article.keywords}</div>
                <a href="${article.url}" target="_top">Open Course →</a>
            </div>
        </div>
    </div>`;

    const $item = $(cardHTML);

    $('#masonry-container').append($item);

    if (!masonryGrid) return;

    masonryGrid.appended($item);

    // ✅ container üzerinden imagesLoaded — timing garantili
    $('#masonry-container').imagesLoaded(() => {
        masonryGrid.layout();
    });
}

/* ── SEARCH ──────────────────────────────────────────────────────── */

// jQuery.toggle(bool) ile DOM'dan kaldırmadan gizle/göster.
// Masonry layout'u 50 ms sonra yenile — Masonry gizli elemanları
// sıfır yükseklik olarak görür, grid kendini yeniden düzenler.
function applySearch(val) {
    val = (val || '').toLowerCase().trim();

    $('.grid-item').each(function () {
        const text = $(this).data('search') || '';
        const show = val === '' || text.indexOf(val) !== -1;
        $(this).toggle(show);
    });

    if (masonryGrid) {
        setTimeout(() => masonryGrid.layout(), 50);
    }
}

$(document).on('input keyup', '#search-input', function () {
    applySearch($(this).val());
});

/* ── UI STATUS ───────────────────────────────────────────────────── */

function updateUIStatus(msg) {
    const txt = document.getElementById("status-message");
    if (txt) txt.innerText = msg;
}

function finalizeUI(isCache = false) {
    const spinner = document.getElementById("status-spinner");
    if (spinner) spinner.style.display = "none";

    document.getElementById("status").innerHTML = `
        <span style="color:#10b981">●</span>
        <span style="font-size:13px;font-weight:600;">
            ${isCache ? 'Fast Cache Load' : 'Courses Updated'}
        </span>
    `;

    setTimeout(() => { $('#status-container').fadeOut(); }, 2000);
}

/* ── FILE PROCESSOR (PARALLEL) ───────────────────────────────────── */

async function processFiles(files) {
    let index = 0;

    async function worker() {
        while (index < files.length) {
            const file = files[index++];
            updateUIStatus(`Scanning: ${file.path}`);
            try {
                const res = await fetch(
                    `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${file.path}`
                );
                if (!res.ok) continue;

                const html = await res.text();
                const doc  = new DOMParser().parseFromString(html, "text/html");

                const title       = doc.querySelector("title")?.innerText?.trim() || "Untitled";
                const description = doc.querySelector('meta[name="description"]')?.content?.trim() || "";
                const keywords    = doc.querySelector('meta[name="keywords"]')?.content?.trim()    || "";
                const image       = doc.querySelector('meta[property="og:image"]')?.content?.trim() || "";
                const urlPath     = file.path.replace(/index\.html$/, "");

                const data = {
                    url: `https://${CONFIG.owner}.github.io/${urlPath}`,
                    title, description, keywords, image
                };

                tempArchive.push(data);
                renderCard(data);

            } catch (e) {
                console.error("File error:", file.path, e);
            }
        }
    }

    await Promise.all(Array.from({ length: CONFIG.concurrency }, worker));
}

/* ── SCANNER ─────────────────────────────────────────────────────── */

async function scanAndCache() {
    try {
        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/git/trees/${CONFIG.branch}?recursive=1`;
        const res  = await fetch(url);
        if (!res.ok) throw new Error("Git tree failed");

        const data  = await res.json();
        const files = data.tree.filter(item =>
            item.type === "blob" &&
            item.path.startsWith(CONFIG.baseFolder) &&
            item.path.endsWith("index.html")
        );

        await processFiles(files);

    } catch (e) {
        console.error("Scan Error:", e);
    }
}

/* ── GRID CLEAR ──────────────────────────────────────────────────── */

function clearGrid() {
    $('#masonry-container').empty();
    initMasonry();
}

/* ── START ───────────────────────────────────────────────────────── */

async function startApp() {
    $('#status-container').show();
    initMasonry();

    const cached = Cache.get();

    if (cached) {
        clearGrid();
        cached.forEach(renderCard);

        // ✅ Tüm kartlar append edildikten sonra container imagesLoaded
        $('#masonry-container').imagesLoaded(() => {
            masonryGrid.layout();
        });

        finalizeUI(true);

    } else {
        await scanAndCache();

        if (tempArchive.length > 0) {
            Cache.set(tempArchive);
        }

        finalizeUI(false);
    }
}

$(document).ready(startApp);

/* ── FOOTER ──────────────────────────────────────────────────────── */

fetch('https://raw.githubusercontent.com/bandanee/root/main/import/footer.html')
    .then(r => r.text())
    .then(h => { document.getElementById('footer-placeholder').innerHTML = h; });

</script>
