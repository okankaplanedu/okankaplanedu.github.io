<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Counter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #00FFCC;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #counter {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
    </style>
</head>
<body>

    <div id="counter">...</div>

    <script>
        // ⚠️ USTA DİKKAT: Buraya makro (exec) ID'sini değil, resmini attığın Google Sheets tablosunun adres çubuğundaki uzun ID'sini yapıştır!
        const spreadsheetId = "BURAYA_GERCEK_GOOGLE_SHEETS_TABLO_ID_SINI_YAZ";
        const jsonURL = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json`;

        // Tarayıcı hafızasından en son kaydedilen sayıyı alıyoruz, yoksa ilk başta null kalıyor
        let lastCount = localStorage.getItem('last_visitor_count') ? parseInt(localStorage.getItem('last_visitor_count')) : null;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playVisitorSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(1500, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch (e) {
                console.error(e);
            }
        }

        // 🔥 DEĞİŞİM VE KLİK EFEKTİ
        function triggerClickEffect() {
            playVisitorSound();
            const el = document.getElementById("counter");
            el.style.transform = "scale(1.25)";
            setTimeout(() => {
                el.style.transform = "scale(1)";
            }, 120);
        }

        // 📡 SAF OKUMA VE KONTROL MEKANİZMASI
        function getData() {
            fetch(jsonURL)
                .then(res => res.text())
                .then(text => {
                    const temp = text.substring(text.indexOf('\n') + 1);
                    const jsonString = temp.substring(temp.indexOf('{'), temp.lastIndexOf('}') + 1);
                    const obj = JSON.parse(jsonString);
                    
                    if (obj && obj.table && obj.table.rows) {
                        const currentCount = obj.table.rows.length; // Excel'deki en son toplam satır sayısı
                        const el = document.getElementById("counter");

                        // Ekrandaki sayıyı her zaman Google'dan gelen en güncel sayıya eşitle
                        el.innerText = currentCount;

                        // ⚡ İLK YÜKLEME / REFRESH KONTROLÜ: 
                        // Eğer lastCount null ise (tarayıcı geçmişi temizse veya ilk kez açılıyorsa) 
                        // gelen en son sayıyı doğrudan hafızaya kilitle ve ses çıkarmadan başla.
                        if (lastCount === null) {
                            lastCount = currentCount;
                            localStorage.setItem("last_visitor_count", currentCount);
                            return;
                        }

                        // 🔥 REFRESH SONRASI DÖNGÜ: Gelen sayı hafızadaki son sayıdan büyükse klik ver
                        if (currentCount > lastCount) {
                            triggerClickEffect();
                        }

                        // 🔄 STORAGE SÜREKLİ EN SON SAYIYA EŞİTLENİR VE BÖYLE DEVAM EDER
                        lastCount = currentCount;
                        localStorage.setItem("last_visitor_count", currentCount);
                    }
                })
                .catch(err => console.error("Read error:", err));
        }

        // Ekrana tıklayınca sadece ses motorunu uyandırır ve anlık veriyi tazeler (Sayıyı asla artırmaz)
        document.getElementById("counter").addEventListener("click", () => {
            initAudio();
            getData();
        });

        // 🚀 BASTIK REFRESH'E / SAYFA AÇILDI
        window.addEventListener("DOMContentLoaded", () => {
            const el = document.getElementById("counter");
            
            // Eğer tarayıcı hafızasında daha önceden kalma bir sayı varsa, Google'dan yanıt gelene kadar ekranda o dursun (0 durmasın)
            if (lastCount !== null) {
                el.innerText = lastCount;
            }
            
            // Hemen gidip Google Docs'taki en son güncel sayıyı çekip hafızaya eşitler
            getData(); 
            
            // Her 10 saniyede bir döngü devam eder
            setInterval(getData, 10000); 
        });
    </script>

</body>
</html>
