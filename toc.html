<script defer

<script>
    'use strict';

    const form = document.getElementById('waContactForm');

    form.addEventListener('submit', function (e) {
        e.preventDefault();

        const name = document.getElementById('uName').value.trim();
        const message = document.getElementById('uMsg').value.trim();
        const btn = document.getElementById('sendBtn');
        let sourceUrl = window.location.href;

        try {
            if (window.parent && window.parent.location) {
                sourceUrl = window.parent.location.href;
            }
        } catch (error) {
            sourceUrl = window.location.href;
        }

        if (!name || !message) {
            if (!name) {
                document.getElementById('uName').focus();
            } else {
                document.getElementById('uMsg').focus();
            }
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `
            <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
            <span>Processing...</span>
        `;

        const phone = '905362279390';
        const formattedMsg = encodeURIComponent(
            `*New Inquiry from Website*\n\n` +
            `*Name:* ${name}\n` +
            `*Message:* ${message}\n\n` +
            `*Sent From:* ${sourceUrl}`
        );

        const waUrl = `https://wa.me/${phone}?text=${formattedMsg}`;
        window.open(waUrl, '_blank', 'noopener,noreferrer');

        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = `
                <i class="fab fa-whatsapp" aria-hidden="true"></i>
                <span>WhatsApp Send</span>
            `;
            form.reset();
        }, 1500);
    });
</script>
