<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Counter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #00FFCC;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #counter {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
    </style>
</head>
<body>

    <div id="counter">...</div>

    <script>
        const googleScriptURL = "https://script.google.com/macros/s/AKfycbycFwlIDvjqFE5_31IGzLb8X-wLSg4Fi8UEFNrSuvYtep5y8h210ts7C8XQuoAzB5qOzg/exec";

        let lastCount = localStorage.getItem('last_visitor_count')
            ? parseInt(localStorage.getItem('last_visitor_count'))
            : null;

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playVisitorSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(1500, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch (e) {
                console.error(e);
            }
        }

        // 🔥 GERÇEK DEĞİŞİM EFEKTİ
        function fakeClickAction() {
            playVisitorSound();
            const el = document.getElementById("counter");
            el.style.transform = "scale(1.25)";
            setTimeout(() => {
                el.style.transform = "scale(1)";
            }, 120);
        }

        // 📡 GOOGLE CALLBACK
        function sayaciGuncelle(data) {
            if (!data || typeof data.count === "undefined") return;

            const currentCount = parseInt(data.count);
            const el = document.getElementById("counter");

            // Ekranı her zaman en taze veriyle güncelle
            el.innerText = currentCount;

            // Eğer hafıza boşsa, ilk kez yükleniyorsa sadece kaydet ve çık (Ses çalma)
            if (lastCount === null) {
                lastCount = currentCount;
                localStorage.setItem("last_visitor_count", currentCount);
                return;
            }

            // 🔥 SADECE SAYI BÜYÜDÜYSE (YENİ ZİYARETÇİ GELDİYSE) TETİKLE
            if (currentCount > lastCount) {
                fakeClickAction();
            }

            // Hafızayı sadece başarılı veri geldiyse güncelle
            lastCount = currentCount;
            localStorage.setItem("last_visitor_count", currentCount);
        }

        // 📥 SADECE OKUMA YAPAR
        function getData() {
            const old = document.getElementById("jsonp-script");
            if (old) old.remove();

            const script = document.createElement("script");
            script.id = "jsonp-script";
            script.src = googleScriptURL + "?callback=sayaciGuncelle&mod=izle&_=" + Date.now();
            document.head.appendChild(script);
        }

        // 🟢 CLICK SADECE SES AKTİF ETMEK İÇİN
        document.getElementById("counter").addEventListener("click", () => {
            initAudio();
            getData();
        });

        // 🚀 START
        window.addEventListener("DOMContentLoaded", () => {
            const el = document.getElementById("counter");
            if (lastCount !== null) {
                el.innerText = lastCount;
            }
            getData();
            setInterval(getData, 10000); // 10 saniyede bir sessiz kontrol
        });
    </script>

</body>
</html>
