<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Ziyaretçi Paneli</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vvh;
            overflow: hidden;
        }

        .panel-kart {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8fa0dd;
            margin-bottom: 30px;
        }

        .sayac-kutusu {
            font-size: 64px;
            font-weight: bold;
            color: #00FFCC;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .yenile-not {
            font-size: 12px;
            color: #56657a;
            margin-top: 25px;
        }

        .durum-isigi {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00FFCC;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #00FFCC;
            animation: kırpışma 1.5s infinite ease-in-out;
        }

        @keyframes kırpışma {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="panel-kart">
        <h1><span class="durum-isigi"></span>Toplam Ziyaretçi</h1>
        
        <div id="canli-sayi" class="sayac-kutusu">...</div>
        
        <div class="yenile-not">Veriler doğrudan Google Etablo'dan anlık çekilmektedir.</div>
    </div>

    <script>
        // Google'dan gelen veriyi yakalayıp ekrana basacak olan callback fonksiyonu
        function sayaciGuncelle(data) {
            if (data && data.count) {
                document.getElementById('canli-sayi').innerText = data.count;
            } else {
                document.getElementById('canli-sayi').innerText = "Hata";
            }
        }

        // Sayfa açılır açılmaz çerez duvarına takılmayan JSONP (Script) isteğini fırlatıyoruz
        window.addEventListener('DOMContentLoaded', () => {
            const googleScriptURL = 'https://script.google.com/macros/s/AKfycbycFwlIDvjqFE5_31IGzLb8X-wLSg4Fi8UEFNrSuvYtep5y8h210ts7C8XQuoAzB5qOzg/exec';
            
            // Google'a fonksiyonumuzu bildiriyoruz
            const jsonpURL = googleScriptURL + '?callback=sayaciGuncelle';

            const script = document.createElement('script');
            script.src = jsonpURL;
            
            script.onerror = function() {
                document.getElementById('canli-sayi').innerText = "Bağlantı Hatası";
            };

            document.head.appendChild(script);
        });
    </script>

</body>
</html>
