<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #00FFCC;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #counter {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="counter">...</div>

    <script>
        const googleScriptURL = 'https://script.google.com/macros/s/AKfycbycFwlIDvjqFE5_31IGzLb8X-wLSg4Fi8UEFNrSuvYtep5y8h210ts7C8XQuoAzB5qOzg/exec';
        let lastCount = localStorage.getItem('last_visitor_count') ? parseInt(localStorage.getItem('last_visitor_count')) : null;
        let audioCtx = null;

        function playClickSound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch (e) {
                console.error(e);
            }
        }

        function sayaciGuncelle(data) {
            if (data && data.count) {
                const currentCount = parseInt(data.count);
                document.getElementById('counter').innerText = currentCount;
                
                if (lastCount !== null && currentCount > lastCount) {
                    playClickSound();
                }
                
                lastCount = currentCount;
                localStorage.setItem('last_visitor_count', currentCount);
            }
        }

        function getData() {
            const oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = googleScriptURL + '?callback=sayaciGuncelle&mod=izle&_=(REPLACE_WITH_TIMESTAMP)'.replace('(REPLACE_WITH_TIMESTAMP)', Date.now());
            document.head.appendChild(script);
        }

        document.getElementById('counter').addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            getData();
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (lastCount !== null) {
                document.getElementById('counter').innerText = lastCount;
            }
            getData();
            setInterval(getData, 10000);
        });
    </script>
</body>
</html>
