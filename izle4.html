<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Counter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #00FFCC;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #counter {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
    </style>
</head>
<body>

    <div id="counter">0</div>

    <script>
        // ⚠️ USTA: Excel Tablonun uzun ID'sini buraya yapıştır
        const spreadsheetId = "BURAYA_EXCEL_TABLONUN_UZUN_ID_SINI_YAZ";
        const jsonURL = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json`;

        // 🚀 İLK STORAGE 0 İLE BAŞLAR: Sayfa her yenilendiğinde hafızayı sıfırlıyoruz
        let lastCount = 0; 
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playVisitorSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(1500, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch (e) {
                console.error(e);
            }
        }

        // 🔥 DEĞİŞİM VE KLİK EFEKTİ
        function triggerClickEffect() {
            playVisitorSound();
            const el = document.getElementById("counter");
            el.style.transform = "scale(1.25)";
            setTimeout(() => {
                el.style.transform = "scale(1)";
            }, 120);
        }

        // 📡 SAF OKUMA VE KONTROL MEKANİZMASI
        function getData() {
            fetch(jsonURL)
                .then(res => res.text())
                .then(text => {
                    const temp = text.substring(text.indexOf('\n') + 1);
                    const jsonString = temp.substring(temp.indexOf('{'), temp.lastIndexOf('}') + 1);
                    const obj = JSON.parse(jsonString);
                    
                    if (obj && obj.table && obj.table.rows) {
                        const currentCount = obj.table.rows.length; // Docs'taki güncel sayı
                        const el = document.getElementById("counter");

                        // Ekrana güncel docs sayısını yaz
                        el.innerText = currentCount;

                        // ⚡ REFRESTE VEYA OTOMATİKTE: Eğer gelen sayı hafızadaki son sayıdan büyükse (ilk açılışta 0'dan büyükse) klik tetikle
                        if (currentCount > lastCount) {
                            triggerClickEffect();
                        }

                        // 🔄 STORAGE SON SAYIYA EŞİTLENİR VE BÖYLE DEVAM EDER
                        lastCount = currentCount;
                    }
                })
                .catch(err => console.error("Read error:", err));
        }

        // Ekrana tıklayınca ses motorunu uyandırıp anlık kontrol yapar (Sayıyı artırmaz)
        document.getElementById("counter").addEventListener("click", () => {
            initAudio();
            getData();
        });

        // 🚀 BASTIK REFRESH'E / SAYFA AÇILDI
        window.addEventListener("DOMContentLoaded", () => {
            // İlk başta ekranda 0 yazar (Hafıza da 0)
            document.getElementById("counter").innerText = "0"; 
            
            // Hemen Docs sayısını almaya gider, sayı > 0 olduğu için klik sesiyle canlanır
            getData(); 
            
            // Her 10 saniyede bir döngü devam eder
            setInterval(getData, 10000); 
        });
    </script>

</body>
</html>
