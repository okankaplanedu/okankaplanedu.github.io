<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Counter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #00FFCC;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #counter {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
    </style>
</head>
<body>

    <div id="counter">...</div>

    <script>
        // ⚠️ USTA SİHİR BURADA: .exec linkini tamamen çöpe attık!
        // Aşağıdaki linke senin Excel Tablonun ID'sini yazacağız. 
        // Bu link sadece tablodaki "A" sütununun en son satır numarasını (yani toplam sayıyı) JSON olarak okur. Tıklasan da doğrusal olarak ARTTIRAMAZ.
        const spreadsheetId = "AKfycbycFwlIDvjqFE5_31IGzLb8X-wLSg4Fi8UEFNrSuvYtep5y8h210ts7C8XQuoAzB5qOzg";
        const jsonURL = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json`;

        let lastCount = localStorage.getItem('last_visitor_count')
            ? parseInt(localStorage.getItem('last_visitor_count'))
            : null;

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playVisitorSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(1500, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch (e) {
                console.error(e);
            }
        }

        // 🔥 GERÇEK DEĞİŞİM EFEKTİ
        function fakeClickAction() {
            playVisitorSound();
            const el = document.getElementById("counter");
            el.style.transform = "scale(1.25)";
            setTimeout(() => {
                el.style.transform = "scale(1)";
            }, 120);
        }

        // 📥 SADECE TEMİZ OKUMA YAPAR (FETCH ENGELİNE TAKILMAZ)
        function getData() {
            fetch(jsonURL)
                .then(res => res.text())
                .then(text => {
                    // Google'dan gelen ham JSON verisini temizleme (gviz formatı temizliği)
                    const temp = text.substring(text.indexOf('\n') + 1);
                    const jsonString = temp.substring(temp.indexOf('{'), temp.lastIndexOf('}') + 1);
                    const obj = JSON.parse(jsonString);
                    
                    // Excel'deki toplam satır sayısını buluyoruz
                    if (obj && obj.table && obj.table.rows) {
                        const currentCount = obj.table.rows.length;
                        const el = document.getElementById("counter");

                        el.innerText = currentCount;

                        if (lastCount === null) {
                            lastCount = currentCount;
                            localStorage.setItem("last_visitor_count", currentCount);
                            return;
                        }

                        if (currentCount > lastCount) {
                            fakeClickAction();
                        }

                        lastCount = currentCount;
                        localStorage.setItem("last_visitor_count", currentCount);
                    }
                })
                .catch(err => console.error("Reading error:", err));
        }

        // 🟢 CLICK SADECE SES AKTİF ETMEK VE ANLIK OKUMAK İÇİN
        document.getElementById("counter").addEventListener("click", () => {
            initAudio();
            getData();
        });

        // 🚀 START
        window.addEventListener("DOMContentLoaded", () => {
            const el = document.getElementById("counter");
            if (lastCount !== null) {
                el.innerText = lastCount;
            }
            getData();
            setInterval(getData, 10000); // 10 saniyede bir salt okunur kontrol
        });
    </script>

</body>
</html>
