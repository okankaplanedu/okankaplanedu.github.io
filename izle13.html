<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Counter</title>

<style>
body{
    background:#111;
    color:#00ff99;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

#count{
    font-size:100px;
}
</style>
</head>

<body>

<h1>A Sütunu Sayısı</h1>
<div id="count">0</div>

<script>

const SHEET_ID = "1YTNeqqpJ9PFUjwT_DFJ7vkX3KEFbsLWgc109cTEWfaM";

async function update() {
    try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=A:A`;

        const res = await fetch(url);
        const text = await res.text();

        const json = JSON.parse(text.substring(47).slice(0, -2));

        const rows = json.table.rows;

        let count = 0;

        for (let i = 0; i < rows.length; i++) {
            const cell = rows[i].c[0];
            if (cell && cell.v !== "") count++;
        }

        document.getElementById("count").innerText = count;

    } catch (e) {
        console.log("Hata:", e);
    }
}

update();
setInterval(update, 3000);

</script>

</body>
</html>
