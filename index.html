<script>
const CONFIG = {
    owner: "okankaplanedu",
    repo: "okankaplanedu.github.io",
    branch: "main",
    baseFolder: "categories",
    cacheKey: "ok_academy_cache_v26",
    fetchDelay: 150
};

let masonryGrid;
let tempArchive = [];

function initMasonry() {
    masonryGrid = $('#masonry-container').masonry({
        itemSelector: '.grid-item',
        columnWidth: '.grid-sizer',
        percentPosition: true,
        transitionDuration: '0.3s'
    });
}

/* ─────────────────────────────
   PERMANENT CACHE (NO API RECALL)
───────────────────────────── */
const Cache = {
    get: () => {
        try {
            const data = localStorage.getItem(CONFIG.cacheKey);
            if (!data) return null;

            const parsed = JSON.parse(data);
            return parsed.articles || null;

        } catch (e) {
            console.error("Cache error:", e);
            return null;
        }
    },

    set: (articles) => {
        try {
            localStorage.setItem(
                CONFIG.cacheKey,
                JSON.stringify({
                    articles
                })
            );
        } catch (e) {
            console.error("Cache save error:", e);
        }
    }
};

/* ─────────────────────────────
   CARD (NO IMAGE)
───────────────────────────── */
function renderCard(article) {

    const plainText = `
        ${article.title}
        ${article.description}
        ${article.keywords}
    `.toLowerCase();

    const cardHTML = `
    <div class="grid-item" data-search="${plainText}" role="article">

        <div class="card-custom">

            <div class="card-body-custom">

                <h2 class="card-title-custom">
                    <span itemprop="headline">${article.title}</span>
                </h2>

                <p class="card-desc-custom">
                    ${article.description || ""}
                </p>

                <div class="card-keywords-custom">
                    ${article.keywords || ""}
                </div>

                <a href="${article.url}"
                   class="btn-open"
                   target="_top"
                   rel="noopener noreferrer">

                   View Details →

                </a>

            </div>

        </div>

    </div>`;

    const $item = $(cardHTML);

    $('#masonry-container').append($item);

    $item.imagesLoaded(() => {
        if (masonryGrid) {
            masonryGrid
                .masonry('appended', $item)
                .masonry('layout');
        }
    });
}

/* ─────────────────────────────
   SEARCH
───────────────────────────── */
function applySearch(val) {
    val = (val || '').toLowerCase().trim();

    $('.grid-item').each(function () {
        const text = $(this).data('search') || '';
        $(this).toggleClass(
            'is-hidden',
            val !== '' && text.indexOf(val) === -1
        );
    });

    if (masonryGrid) {
        masonryGrid.masonry('layout');
    }
}

$(document).on('input keyup', '#search-input', function () {
    applySearch($(this).val());
});

/* header sync */
const headerObserver = new MutationObserver(function () {
    const $input = $('#search-input');
    if ($input.length) {
        applySearch($input.val());
    }
});

headerObserver.observe(
    document.getElementById('header-container'),
    { childList: true, subtree: true }
);

/* ─────────────────────────────
   GITHUB SCAN (ONLY FIRST TIME)
───────────────────────────── */
async function scanAndCache(path) {
    try {
        const res = await fetch(
            `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`
        );

        if (!res.ok) return;

        const items = await res.json();

        for (const item of items) {

            if (item.type === "dir") {

                await scanAndCache(item.path);

            } else if (
                item.name === "index.html" &&
                path !== CONFIG.baseFolder
            ) {

                const contentRes = await fetch(
                    `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${item.path}`
                );

                if (contentRes.ok) {

                    const html = await contentRes.text();

                    const doc = new DOMParser()
                        .parseFromString(html, "text/html");

                    const data = {
                        url: `https://${CONFIG.repo}/${item.path.replace('index.html', '')}`,
                        title: doc.querySelector("title")?.innerText?.trim() || "Untitled",
                        description: doc.querySelector('meta[name="description"]')?.getAttribute("content")?.trim() || "",
                        keywords: doc.querySelector('meta[name="keywords"]')?.getAttribute("content")?.trim() || ""
                    };

                    tempArchive.push(data);
                    renderCard(data);
                }

                await new Promise(r => setTimeout(r, CONFIG.fetchDelay));
            }
        }

    } catch (e) {
        console.error("Scan error:", e);
    }
}

/* ─────────────────────────────
   UI
───────────────────────────── */
function updateUIStatus(msg) {
    const txt = document.getElementById("status-message");
    if (txt) txt.innerText = msg;
}

function finalizeUI(isCache = false) {
    const spinner = document.getElementById("status-spinner");
    if (spinner) spinner.style.display = "none";

    const status = document.getElementById("status");

    status.innerHTML = `
        <span style="color:#10b981">●</span>
        <span style="font-size:13px; font-weight:600;">
            ${isCache ? 'Cache Loaded' : 'Fresh Build'}
        </span>
    `;

    setTimeout(() => {
        $('#status-container').fadeOut();
    }, 2500);
}

/* ─────────────────────────────
   START
───────────────────────────── */
async function startApp() {

    initMasonry();

    const cached = Cache.get();

    if (cached && cached.length > 0) {

        cached.forEach(renderCard);
        finalizeUI(true);
        return; // ❌ API NEVER RUNS AGAIN

    }

    await scanAndCache(CONFIG.baseFolder);

    if (tempArchive.length > 0) {
        Cache.set(tempArchive);
    }

    finalizeUI(false);
}

$(document).ready(startApp);

/* footer */
fetch('https://raw.githubusercontent.com/bandanee/root/main/import/footer.html')
    .then(r => r.text())
    .then(h => document.getElementById('footer-placeholder').innerHTML = h);

</script>

    function sayaciGuncelle(data) {
        document.getElementById('excel-sayac').innerText = data.count;
    }

    window.addEventListener('DOMContentLoaded', () => {
        // ⚠️ BURAYA AZ ÖNCE ALDIĞIN EN GÜNCEL YENİ LİNKİ YAPIŞTIR USTA
        const googleScriptURL = 'BURAYA_YENI_WEB_UYGULAMASI_LINKINI_YAZ';

        // Linkin sonuna Google'ın okuyabilmesi için callback parametresini ekliyoruz
        const jsonpURL = googleScriptURL + '?callback=sayaciGuncelle';

        // Arka planda gizli bir script etiketi oluşturup sayfaya ekliyoruz (CORS engelini yıkar)
        const script = document.createElement('script');
        script.src = jsonpURL;
        document.body.appendChild(script);
    });
</script>
