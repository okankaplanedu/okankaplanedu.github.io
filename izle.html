<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Counter</title>

<style>
body {
    margin: 0;
    background: #0b0f19;
    color: #00ffcc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    user-select: none;
    overflow: hidden;
}

#counter {
    font-size: 120px;
    font-weight: bold;
    text-shadow: 0 0 30px rgba(0,255,204,0.4);
    transition: transform 0.12s ease;
}
</style>
</head>

<body>

<div id="counter">0</div>

<script>
const googleScriptURL = "https://script.google.com/macros/s/AKfycbycFwlIDvjqFE5_31IGzLb8X-wLSg4Fi8UEFNrSuvYtep5y8h210ts7C8XQuoAzB5qOzg/exec";

let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playClickSound() {
    try {
        initAudio();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(1400, audioCtx.currentTime);

        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
    } catch (e) {
        console.error(e);
    }
}

function clickAnimation() {
    const el = document.getElementById("counter");
    el.style.transform = "scale(1.3)";
    setTimeout(() => el.style.transform = "scale(1)", 120);
}

// 🔥 STORAGE (son görülen değer)
let lastStored = localStorage.getItem("last_count")
    ? parseInt(localStorage.getItem("last_count"))
    : null;

// 📡 CALLBACK (SADECE OKUR)
function sayaciGuncelle(data) {
    if (!data || typeof data.count === "undefined") return;

    const serverCount = parseInt(data.count);
    const el = document.getElementById("counter");

    el.innerText = serverCount;

    // İlk yükleme
    if (lastStored === null) {
        lastStored = serverCount;
        localStorage.setItem("last_count", serverCount);
        return;
    }

    // 🔥 SERVER > STORAGE → CLICK EVENT
    if (serverCount > lastStored) {
        playClickSound();
        clickAnimation();
    }

    // 🔄 HER DURUMDA SYNC
    lastStored = serverCount;
    localStorage.setItem("last_count", serverCount);
}

// 📥 SADECE VERİ ÇEKER
function getData() {
    const old = document.getElementById("jsonp");
    if (old) old.remove();

    const script = document.createElement("script");
    script.id = "jsonp";

    script.src =
        googleScriptURL +
        "?callback=sayaciGuncelle&mod=izle&_=" +
        Date.now();

    document.head.appendChild(script);
}

// 🚀 START
window.addEventListener("DOMContentLoaded", () => {
    if (lastStored !== null) {
        document.getElementById("counter").innerText = lastStored;
    }

    getData();
    setInterval(getData, 10000);
});
</script>

</body>
</html>
