<script>
function fixPlaylistUrl(url) {
  try {
    // URL gibi parse etmeye çalış
    const decoded = decodeURIComponent(url);

    // en son gerçek playlist ID'yi yakala
    const matches = [...decoded.matchAll(/list=([a-zA-Z0-9_-]+)/g)];

    if (matches.length === 0) return url;

    const lastValid = matches[matches.length - 1][1];

    return `https://www.youtube.com/playlist?list=${lastValid}`;
  } catch (e) {
    return url;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll("a.yt-play-button").forEach(a => {
    const fixed = fixPlaylistUrl(a.href);
    a.href = fixed;
  });
});
</script>
