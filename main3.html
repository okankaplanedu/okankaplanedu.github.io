<article>
 
<div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
    <p style="color: #666; font-size: 14px; margin-bottom: 5px;">
        Views: <strong id="excel-sayac" style="color: #00FFCC; font-size: 18px;">...</strong>
    </p>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        
        
        const googleScriptURL = 'https://script.google.com/macros/s/AKfycbyi7csBC7863rT9Ynx3pv4qzjuz6v1jAEtFWX7NBYqWpvTKwYT9onDzZ44BjlOI9_-1MA/exec
';

        // Google yönlendirmelerini (redirect) takip etmesi için redirect: 'follow' ekledik
        fetch(googleScriptURL, { method: 'GET', redirect: 'follow' })
            .then(res => res.json())
            .then(data => {
                document.getElementById('excel-sayac').innerText = data.count;
            })
            .catch(hata => {
                console.error("Sayaç Hatası:", hata);
                document.getElementById('excel-sayac').innerText = "Hata";
            });
    });
</script>
 
 
</article>
