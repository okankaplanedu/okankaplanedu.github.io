<article>
<strong id="excel-sayac" style="color: #00FFCC; font-family: Arial, sans-serif; font-size: 18px;">...</strong>

<iframe srcdoc="
    <script>
        const googleScriptURL = 'https://script.google.com/macros/s/AKfycbwwu_4xnLzGcUU0NMx1KTSz8d7uzrF0RjV7LkrInAEr-p8rplR30-emYfOlCcEshsMTYA/exec';
  fetch(googleScriptURL, { 
            method: 'GET', 
            mode: 'cors',
            credentials: 'omit',
            cache: 'no-store',
            redirect: 'follow'
        })
        .then(res => res.text())
        .then(sayi => {

            const anaSayac = parent.document.getElementById('excel-sayac');
            if (anaSayac && sayi && !isNaN(sayi.trim())) {
                anaSayac.innerText = sayi.trim();
            }
        })
        .catch(err => {
            console.error('Sayaç iframe hatası:', err);
        });
    </script>
" style="display: none; width: 0; height: 0; border: none;"></iframe>
</article>
