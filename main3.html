<script>
function fixYouTubePlaylist(url) {
 
  const matches = [...url.matchAll(/list=([a-zA-Z0-9_-]+)/g)];

  if (matches.length === 0) return url;

  const playlistId = matches[matches.length - 1][1];

  return `https://www.youtube.com/playlist?list=${playlistId}`;
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".yt-play-button").forEach(a => {
    const original = a.getAttribute("href");
    const fixed = fixYouTubePlaylist(original);

    a.setAttribute("href", fixed);
  });
});
</script>
